name: Build & Deploy to Sigma

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # ---------- Frontend (Vite/React) ----------
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Build (production)
        working-directory: front
        # VITE_API_URL is intentionally unset → production build uses same-origin
        # ('' + /api), which nginx reverse-proxies to the backend.
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front/dist/
          retention-days: 3
          if-no-files-found: error

  # ---------- Backend (Rust/Axum) ----------
  build-backend:
    # ubuntu-22.04 (glibc 2.35) so the binary runs on the server's Ubuntu 24.04
    # (glibc 2.39). openssl 3.x is ABI-compatible across both.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      # sqlx::query! macros are compile-time checked against this DB's schema.
      DATABASE_URL: sqlite:/tmp/blog-build.db
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Prepare schema DB for sqlx compile-time checks
        working-directory: backend
        # Apply migrations to a throwaway SQLite DB so sqlx::query!/query_as!
        # can verify queries at build time (no live DB, no committed .sqlx cache).
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends sqlite3
          rm -f /tmp/blog-build.db
          for f in $(ls migrations/*.sql | sort); do
            echo "applying $f"
            sqlite3 /tmp/blog-build.db < "$f"
          done

      - name: Build release binary
        working-directory: backend
        run: cargo build --release --locked

      - uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/target/release/chuyi-uk-back
          retention-days: 3
          if-no-files-found: error

  # ---------- Deploy (rsync artifacts → restart service) ----------
  deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: bin

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy frontend (rsync dist, --delete)
        run: |
          chmod -R a+rX dist
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/blog/frontend/dist/"

      - name: Deploy tools (gitbook2epub python scripts)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            backend/tools/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/blog/backend/tools/"

      - name: Deploy backend (upload binary, atomic swap, restart)
        run: |
          chmod +x bin/chuyi-uk-back
          # Upload to a temp name to avoid ETXTBSY on the running binary.
          rsync -az \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            bin/chuyi-uk-back \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/blog/backend/target/release/chuyi-uk-back.new"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
              set -e
              cd /var/www/blog/backend/target/release
              mv -f chuyi-uk-back.new chuyi-uk-back   # atomic on same fs
              chmod +x chuyi-uk-back
              sudo systemctl restart blog-backend
            '

      - name: Health check
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
              for i in $(seq 1 20); do
                code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3006/api/health || true)
                echo "attempt $i: /api/health -> $code"
                [ "$code" = "200" ] && { echo "backend healthy ✅"; exit 0; }
                sleep 2
              done
              echo "❌ backend did not become healthy"
              sudo systemctl status blog-backend --no-pager | tail -30
              journalctl -u blog-backend --no-pager -n 40
              exit 1
            '
